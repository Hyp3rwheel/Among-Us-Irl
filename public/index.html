<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Among Us IRL - Multiplayer</title>
<style>
body { font-family: Arial; background: #111; color: #fff; text-align: center; margin:0; padding:0;}
.screen { display: none; min-height: 100vh; justify-content: center; align-items: flex-start; flex-direction: column; padding: 50px; }
.screen.active { display: flex; }
.box { background: #222; padding: 20px; border-radius: 15px; margin: 10px auto; min-width: 300px; position: relative; }
h2 { margin-bottom: 20px; }
#taskContainer, #selectedTasks { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; min-height: 150px; padding: 10px; border: 2px dashed #555; border-radius: 10px; margin-bottom: 20px; }
.taskBox { background: #28a745; padding: 10px 15px; border-radius: 8px; cursor: pointer; user-select: none; }
.taskBox.selected { background: #218838; }
button { padding: 12px 20px; font-size: 16px; border-radius: 6px; border: none; background-color: #28a745; color: white; cursor: pointer; }
button:hover { background-color: #218838; }
p { margin: 10px 0; }
</style>
</head>
<body>

<div id="screenWelcome" class="screen active">
  <div class="box">
    <h2>Welcome!</h2>
    <input type="text" id="username" placeholder="Enter your username"><br><br>
    <button onclick="chooseMode('create')">Create Game</button>
    <button onclick="chooseMode('join')">Join Game</button>
  </div>
</div>

<div id="screenCreate" class="screen">
  <div class="box">
    <h2>Create Game</h2>
    Players: <input type="number" id="maxPlayers" min="1" max="25"><br><br>

    <h3>Available Tasks (click to select)</h3>
    <div id="taskContainer"></div>

    <h3>Your Selected Tasks</h3>
    <div id="selectedTasks"></div>

    <button onclick="startGame()">Create Game</button>
    <p id="gameCodeDisplay"></p>
  </div>
</div>

<div id="screenJoin" class="screen">
  <div class="box">
    <h2>Join Game</h2>
    Enter Game Code: <input type="text" id="joinCode"><br><br>
    <button onclick="joinGame()">Join</button>
    <p id="joinMessage"></p>
  </div>
</div>

<div id="screenLobby" class="screen">
  <div class="box">
    <h2>Lobby</h2>
    <p id="lobbyInfo"></p>
    <p>Players: <span id="playerList"></span></p>
  </div>
</div>

<div id="screenTasks" class="screen">
  <div class="box">
    <h2>Tasks Assigned</h2>
    <div id="assignedTasks"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD-rRsg7FxuddLe4moASb-cL6qHNwux0b8",
  authDomain: "among-us-irl-aec6e.firebaseapp.com",
  databaseURL: "https://among-us-irl-aec6e-default-rtdb.firebaseio.com",
  projectId: "among-us-irl-aec6e",
  storageBucket: "among-us-irl-aec6e.firebasestorage.app",
  messagingSenderId: "65551016275",
  appId: "1:65551016275:web:11c0db681243941a1f01a6"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let username = null;
let currentGameCode = null;

// --- Screens ---
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// --- Welcome ---
function chooseMode(mode){
  username = document.getElementById('username').value.trim();
  if(!username){ alert("Enter username!"); return; }
  if(mode==='create'){ 
    showScreen('screenCreate');
    generateTaskBoxes();
  } else { showScreen('screenJoin'); }
}

// --- Click Tasks ---
function generateTaskBoxes(){
  const container = document.getElementById('taskContainer');
  const selected = document.getElementById('selectedTasks');
  container.innerHTML=''; selected.innerHTML='';
  for(let i=1;i<=25;i++){
    const t = document.createElement('div');
    t.className='taskBox';
    t.innerText=i;
    t.onclick = ()=>{
      if(t.classList.contains('selected')){
        t.classList.remove('selected');
        selected.querySelector(`div[data-task="${i}"]`)?.remove();
      } else {
        t.classList.add('selected');
        const b = document.createElement('div');
        b.innerText=i;
        b.dataset.task=i;
        selected.appendChild(b);
      }
    };
    container.appendChild(t);
  }
}

// --- Start Game ---
function startGame(){
  const maxPlayers = parseInt(document.getElementById('maxPlayers').value);
  const tasks = [...document.getElementById('selectedTasks').children].map(t=>t.innerText);
  if(!maxPlayers || tasks.length===0){ alert("Enter players and select tasks!"); return; }

  currentGameCode = Math.floor(100000 + Math.random()*900000).toString();
  db.ref('games/'+currentGameCode).set({
    creator: username,
    maxPlayers,
    tasks,
    players: {[username]: true}
  });

  document.getElementById('gameCodeDisplay').innerText = `Game Code: ${currentGameCode}`;
  listenLobby(currentGameCode);
  showScreen('screenLobby');
}

// --- Join Game ---
function joinGame(){
  const code = document.getElementById('joinCode').value.trim();
  if(!code){ alert("Enter code!"); return; }
  db.ref('games/'+code).get().then(s=>{
    if(!s.exists()){ document.getElementById('joinMessage').innerText="Game not found"; return; }
    currentGameCode = code;
    db.ref(`games/${code}/players/${username}`).set(true);
    listenLobby(code);
    showScreen('screenLobby');
  });
}

// --- Lobby ---
function listenLobby(code){
  db.ref('games/'+code).on('value', snapshot=>{
    const game = snapshot.val();
    if(!game) return;
    document.getElementById('lobbyInfo').innerText = `Code: ${code}, Tasks: ${game.tasks.join(', ')}`;
    document.getElementById('playerList').innerText = Object.keys(game.players).join(', ');

    // If player count reached, assign tasks evenly
    if(Object.keys(game.players).length === game.maxPlayers){
      assignTasks(game);
    }
  });
}

// --- Assign tasks evenly ---
function assignTasks(game){
  const players = Object.keys(game.players);
  const tasks = [...game.tasks];
  const assignments = {};

  // Shuffle tasks
  tasks.sort(()=>Math.random()-0.5);

  // Distribute tasks as evenly as possible
  let i=0;
  players.forEach(p=>{
    assignments[p] = [];
  });
  tasks.forEach((task, index)=>{
    const player = players[index % players.length];
    assignments[player].push(task);
  });

  // Write to Firebase
  db.ref(`games/${currentGameCode}/assignments`).set(assignments);

  // If current user, show assigned tasks
  const myTasks = assignments[username] || [];
  const container = document.getElementById('assignedTasks');
  container.innerHTML = myTasks.map(t=>`<div class="taskBox">${t}</div>`).join('');
  showScreen('screenTasks');
}
</script>
</body>
</html>

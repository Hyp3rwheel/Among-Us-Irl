<script>
const firebaseConfig = {
  apiKey: "AIzaSyD-rRsg7FxuddLe4moASb-cL6qHNwux0b8",
  authDomain: "among-us-irl-aec6e.firebaseapp.com",
  databaseURL: "https://among-us-irl-aec6e-default-rtdb.firebaseio.com",
  projectId: "among-us-irl-aec6e",
  storageBucket: "among-us-irl-aec6e.firebasestorage.app",
  messagingSenderId: "65551016275",
  appId: "1:65551016275:web:11c0db681243941a1f01a6"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let username = null;
let currentGameCode = null;
let isHost = false; // Important: track who the creator is

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function chooseMode(mode){
  username = document.getElementById('username').value.trim();
  if(!username){ alert("Enter username!"); return; }
  if(mode==='create'){ 
    isHost = true;
    showScreen('screenCreate');
    generateTaskBoxes();
  } else { 
    isHost = false;
    showScreen('screenJoin'); 
  }
}

function generateTaskBoxes(){
  const container = document.getElementById('taskContainer');
  const selected = document.getElementById('selectedTasks');
  container.innerHTML=''; selected.innerHTML='';
  for(let i=1;i<=25;i++){
    const t = document.createElement('div');
    t.className='taskBox';
    t.innerText=i;
    t.onclick = ()=>{
      if(t.classList.contains('selected')){
        t.classList.remove('selected');
        selected.querySelector(`div[data-task="${i}"]`)?.remove();
      } else {
        t.classList.add('selected');
        const b = document.createElement('div');
        b.innerText=i;
        b.dataset.task=i;
        b.classList.add('selected');
        selected.appendChild(b);
      }
    };
    container.appendChild(t);
  }
}

function startGame(){
  const maxPlayers = parseInt(document.getElementById('maxPlayers').value);
  const tasks = [...document.getElementById('selectedTasks').children].map(t=>t.innerText);
  if(!maxPlayers || tasks.length===0){ alert("Enter players and select tasks!"); return; }

  currentGameCode = Math.floor(100000 + Math.random()*900000).toString();
  db.ref('games/'+currentGameCode).set({
    creator: username,
    maxPlayers,
    tasks,
    players: {[username]: true},
    status: 'lobby' // Add a status to track game state
  });

  document.getElementById('gameCodeDisplay').innerText = `Game Code: ${currentGameCode}`;
  listenLobby(currentGameCode);
  showScreen('screenLobby');
}

function joinGame(){
  const code = document.getElementById('joinCode').value.trim();
  if(!code){ alert("Enter code!"); return; }
  
  db.ref('games/'+code).once('value', snapshot => {
    if(!snapshot.exists()) {
      alert("Game not found!");
    } else {
      currentGameCode = code;
      db.ref(`games/${code}/players/${username}`).set(true);
      listenLobby(code);
      showScreen('screenLobby');
    }
  });
}

function listenLobby(code){
  db.ref('games/'+code).on('value', snapshot=>{
    const game = snapshot.val();
    if(!game) return;

    document.getElementById('lobbyInfo').innerText = `Code: ${code}`;
    document.getElementById('playerList').innerText = Object.keys(game.players).join(', ');

    // Only the HOST triggers the assignment logic
    if(isHost && game.status === 'lobby' && Object.keys(game.players).length >= game.maxPlayers){
      db.ref(`games/${code}/status`).set('started'); // Update status so this only runs ONCE
      assignTasksAndRole(game);
    }

    // EVERYONE switches to task screen once assignments and roles exist in the DB
    if(game.assignments && game.roles && game.assignments[username]){
      displayTasks(game.assignments[username], game.roles[username]);
    }
  });
}

function assignTasksAndRole(game){
  const players = Object.keys(game.players);
  const tasks = [...game.tasks];
  tasks.sort(()=>Math.random()-0.5);
  
  const assignments = {};
  players.forEach(p=>assignments[p]=[]);
  tasks.forEach((task,index)=>{
    const player = players[index % players.length];
    assignments[player].push(task);
  });

  const imposterIndex = Math.floor(Math.random()*players.length);
  const roles = {};
  players.forEach((p,i)=> roles[p] = i===imposterIndex ? 'Imposter' : 'Crewmate');

  // Push all data to Firebase at once
  db.ref(`games/${currentGameCode}`).update({
    assignments: assignments,
    roles: roles
  });
}

function displayTasks(myTasks, myRole) {
  const container = document.getElementById('assignedTasks');
  if(container.innerHTML !== "") return; // Don't re-render if already there

  document.getElementById('roleDisplay').innerText = myRole;
  myTasks.forEach(task=>{
    const div = document.createElement('div');
    div.className='taskBox selected';
    div.innerHTML = `<span>${task}</span> <input type="checkbox" class="checkbox">`;
    div.querySelector('input').addEventListener('change',()=>{
      if([...container.querySelectorAll('input')].every(c=>c.checked)){
        showScreen('screenComplete');
      }
    });
    container.appendChild(div);
  });
  showScreen('screenTasks');
}
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Among Us IRL - Multiplayer</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #111; color: #fff; text-align: center; margin:0; padding:0; -webkit-font-smoothing: antialiased; }
        .screen { display: none; min-height: 100vh; justify-content: center; align-items: center; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .screen.active { display: flex; }
        .box { background: #222; padding: 25px; border-radius: 15px; width: 100%; max-width: 350px; position: relative; border: 1px solid #444; box-shadow: 0 10px 30px rgba(0,0,0,0.5); box-sizing: border-box; }
        h2 { margin-top: 0; color: #28a745; text-transform: uppercase; letter-spacing: 2px; }
        h3 { font-size: 1rem; color: #aaa; margin-bottom: 10px; }
        
        #taskContainer, #selectedTasks { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 10px; border: 2px dashed #555; border-radius: 10px; margin-bottom: 20px; background: #1a1a1a; }
        .taskBox { background: #444; padding: 12px 5px; border-radius: 8px; cursor: pointer; user-select: none; border: 2px solid transparent; font-weight: bold; transition: 0.1s; display: flex; align-items: center; justify-content: center; }
        .taskBox.selected { background: #28a745; border-color: #fff; transform: scale(0.95); }
        
        #assignedTasks { display: flex; flex-direction: column; gap: 12px; width: 100%; margin-top: 20px; }
        .assignedRow { background: #333; padding: 15px; border-radius: 10px; display: flex; align-items: center; justify-content: space-between; border-left: 5px solid #28a745; text-align: left; }
        
        .checkbox { width: 30px; height: 30px; cursor: pointer; accent-color: #28a745; -webkit-appearance: checkbox; appearance: checkbox; margin-left: 15px; flex-shrink: 0; }
        button { padding: 15px 20px; font-size: 16px; border-radius: 10px; border: none; background-color: #28a745; color: white; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; box-shadow: 0 4px #1a632a; transition: 0.1s; }
        button:active { transform: translateY(2px); box-shadow: 0 2px #1a632a; }
        
        .kill-btn { background-color: #dc3545; box-shadow: 0 4px #8b1e2a; margin-top: 20px; }
        .loc-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 10px; }
        .loc-btn { background: #444; border: 1px solid #666; padding: 15px; border-radius: 8px; font-weight: bold; }
        
        #deathOverlay, #timerOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #8b1e2a; z-index: 9999; flex-direction: column; justify-content: center; align-items: center; padding: 30px; text-align: center; }
        #deathOverlay.active, #timerOverlay.active { display: flex; }
        .timer-text { font-size: 5rem; font-weight: bold; margin: 20px 0; }
    </style>
</head>
<body>

<audio id="deathSound" src="https://actions.google.com/sounds/v1/alerts/high_frequenzy_beep.ogg" preload="auto"></audio>

<div id="deathOverlay">
    <h1 style="font-size: 2.5rem;">YOU HAVE DIED</h1>
    <p id="deathLocText" style="font-size: 1.2rem; margin: 20px 0;"></p>
    <button onclick="startDeathTimer()" style="background: white; color: #8b1e2a; width: 200px;">UNDERSTOOD</button>
</div>

<div id="timerOverlay">
    <h2 id="timerStatusText">Get to your location...</h2>
    <div id="countdown" class="timer-text">10</div>
    <p id="finalDeathNote" style="display:none; font-size: 1.5rem; font-weight: bold;">STOP WHERE YOU ARE, YOUR DEAD</p>
</div>

<div id="screenWelcome" class="screen active">
  <div class="box">
    <h2>Among Us IRL</h2>
    <input type="text" id="username" placeholder="Enter Name" style="padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 10px; background: #000; color: #fff;">
    <button onclick="chooseMode('create')">CREATE GAME</button>
    <button onclick="chooseMode('join')">JOIN GAME</button>
  </div>
</div>

<div id="screenCreate" class="screen">
  <div class="box">
    <h2>Host Settings</h2>
    <input type="number" id="maxPlayers" value="2" min="1" max="25" style="padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 10px; background: #000; color: #fff;">
    <h3>Select Tasks (1-25)</h3>
    <div id="taskContainer"></div>
    <div id="selectedTasks"></div>
    <button onclick="startGame()">OPEN LOBBY</button>
  </div>
</div>

<div id="screenJoin" class="screen">
  <div class="box">
    <h2>Join Mission</h2>
    <input type="text" id="joinCode" placeholder="6-Digit Code" inputmode="numeric" style="padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 10px; background: #000; color: #fff;">
    <button onclick="joinGame()">JOIN</button>
  </div>
</div>

<div id="screenLobby" class="screen">
  <div class="box">
    <h2>Lobby</h2>
    <h1 id="lobbyCodeDisplay" style="color:#28a745; letter-spacing: 5px;">------</h1>
    <div id="playerList" style="margin-bottom: 20px; font-weight: bold;"></div>
    <div id="hostControls" style="display:none;">
      <button onclick="manualStart()" style="background: #dc3545;">START GAME</button>
    </div>
  </div>
</div>

<div id="screenKillPicker" class="screen">
    <div class="box">
        <h2 id="pickerTitle">Decoy Location</h2>
        <div id="pickerOptions" class="loc-grid"></div>
        <button onclick="showScreen('screenTasks')" style="background: #555;">CANCEL</button>
    </div>
</div>

<div id="screenTasks" class="screen">
  <div class="box">
    <h3 style="margin:0;">YOUR ROLE:</h3>
    <h1 id="roleDisplay" style="margin: 5px 0 20px 0;">...</h1>
    <div id="imposterTools" style="display:none;">
        <button class="kill-btn" onclick="openLocationPicker()">DECOY LOCATION</button>
    </div>
    <h3>ACTIVE TASKS</h3>
    <div id="assignedTasks"></div>
  </div>
</div>

<div id="screenComplete" class="screen">
  <div class="box">
    <h2 style="color: gold;">MISSION CLEAR</h2>
    <p>You finished your tasks!</p>
    <p>Watch your back.</p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD-rRsg7FxuddLe4moASb-cL6qHNwux0b8",
  authDomain: "among-us-irl-aec6e.firebaseapp.com",
  databaseURL: "https://among-us-irl-aec6e-default-rtdb.firebaseio.com",
  projectId: "among-us-irl-aec6e",
  storageBucket: "among-us-irl-aec6e.firebasestorage.app",
  messagingSenderId: "65551016275",
  appId: "1:65551016275:web:11c0db681243941a1f01a6"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let username = null;
let currentGameCode = null;
let isHost = false;
let myRole = 'Crewmate';
let tempLoc = "";

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function chooseMode(mode){
  username = document.getElementById('username').value.trim();
  if(!username){ alert("Enter your name!"); return; }
  if(mode==='create'){ isHost = true; showScreen('screenCreate'); generateTaskBoxes(); }
  else { isHost = false; showScreen('screenJoin'); }
}

function generateTaskBoxes(){
  const container = document.getElementById('taskContainer');
  const selected = document.getElementById('selectedTasks');
  container.innerHTML=''; selected.innerHTML='';
  for(let i=1;i<=25;i++){
    const t = document.createElement('div');
    t.className='taskBox'; t.innerText=i;
    t.onclick = ()=>{
      if(t.classList.contains('selected')){
        t.classList.remove('selected');
        selected.querySelector(`div[data-task="${i}"]`)?.remove();
      } else {
        t.classList.add('selected');
        const b = document.createElement('div');
        b.className = 'taskBox selected'; b.innerText = i; b.dataset.task = i;
        selected.appendChild(b);
      }
    };
    container.appendChild(t);
  }
}

function startGame(){
  const maxPlayers = parseInt(document.getElementById('maxPlayers').value);
  const tasks = [...document.getElementById('selectedTasks').children].map(t=>t.innerText);
  currentGameCode = Math.floor(100000 + Math.random()*900000).toString();
  db.ref('games/'+currentGameCode).set({
    creator: username, maxPlayers, tasks, players: {[username]: true}, status: 'lobby'
  });
  listenLobby(currentGameCode);
  showScreen('screenLobby');
}

function joinGame(){
  const code = document.getElementById('joinCode').value.trim();
  db.ref('games/'+code).once('value', s => {
    if(!s.exists()){ alert("Game not found!"); return; }
    currentGameCode = code;
    db.ref(`games/${code}/players/${username}`).set(true);
    listenLobby(code);
    showScreen('screenLobby');
  });
}

function listenLobby(code){
  document.getElementById('lobbyCodeDisplay').innerText = code;
  db.ref('games/'+code).on('value', snapshot => {
    const game = snapshot.val();
    if(!game) return;
    document.getElementById('playerList').innerText = Object.keys(game.players).join(', ');
    if(isHost) document.getElementById('hostControls').style.display = 'block';

    if(game.status === 'started' && game.assignments && game.roles){
      myRole = game.roles[username];
      displayTasks(game.assignments[username], myRole);
      
      if(myRole === 'Crewmate' && game.deadPlayers && game.deadPlayers[username]) {
          const deathData = game.deadPlayers[username];
          if(!deathData.acknowledged) {
              document.getElementById('deathLocText').innerText = "Please report to: " + deathData.location;
              // PLAY THE NOISE
              const sound = document.getElementById('deathSound');
              sound.play().catch(e => console.log("Sound failed until user interacts"));
              document.getElementById('deathOverlay').classList.add('active');
          }
      }
    }
  });
}

function manualStart(){
  db.ref('games/'+currentGameCode).once('value', snapshot => {
    const game = snapshot.val();
    const players = Object.keys(game.players);
    const tasks = [...game.tasks];
    tasks.sort(()=>Math.random()-0.5);
    const assignments = {};
    players.forEach(p=>assignments[p]=[]);
    tasks.forEach((task,index)=>{ assignments[players[index % players.length]].push(task); });
    const impIndex = Math.floor(Math.random()*players.length);
    const roles = {};
    players.forEach((p,i)=> roles[p] = (i===impIndex ? 'Imposter' : 'Crewmate'));
    db.ref('games/'+currentGameCode).update({ assignments, roles, status: 'started' });
  });
}

function displayTasks(myTasks, role) {
  const container = document.getElementById('assignedTasks');
  if(container.innerHTML !== "") return; 
  document.getElementById('roleDisplay').innerText = role;
  document.getElementById('roleDisplay').style.color = (role === 'Imposter' ? '#ff4d4d' : '#28a745');
  if(role === 'Imposter') document.getElementById('imposterTools').style.display = 'block';

  myTasks.forEach(task=>{
    const div = document.createElement('div');
    div.className='assignedRow';
    div.innerHTML = `<span class="taskLabel">Task ${task}</span> <input type="checkbox" class="checkbox">`;
    div.querySelector('input').addEventListener('change',()=>{
      if(role === 'Crewmate' && [...container.querySelectorAll('input')].every(c=>c.checked)){
        showScreen('screenComplete');
      }
    });
    container.appendChild(div);
  });
  showScreen('screenTasks');
}

function openLocationPicker() {
    tempLoc = "";
    document.getElementById('pickerTitle').innerText = "Decoy Location";
    const options = ["Beach", "Palm", "Pete", "Epestein", "Stay"];
    const container = document.getElementById('pickerOptions');
    container.innerHTML = "";
    options.forEach(loc => {
        const btn = document.createElement('button');
        btn.className = "loc-btn";
        btn.innerText = loc;
        btn.onclick = () => openSubjectPicker(loc);
        container.appendChild(btn);
    });
    showScreen('screenKillPicker');
}

function openSubjectPicker(loc) {
    tempLoc = loc;
    document.getElementById('pickerTitle').innerText = "Who is the subject?";
    db.ref('games/'+currentGameCode+'/players').once('value', snapshot => {
        const players = Object.keys(snapshot.val());
        const container = document.getElementById('pickerOptions');
        container.innerHTML = "";
        players.forEach(p => {
            if(p !== username) {
                const btn = document.createElement('button');
                btn.className = "loc-btn";
                btn.innerText = p;
                btn.onclick = () => executeKill(p);
                container.appendChild(btn);
            }
        });
    });
}

function executeKill(target) {
    db.ref(`games/${currentGameCode}/deadPlayers/${target}`).set({
        location: tempLoc,
        acknowledged: false
    });
    showScreen('screenTasks');
}

function startDeathTimer() {
    document.getElementById('deathOverlay').classList.remove('active');
    document.getElementById('timerOverlay').classList.add('active');
    db.ref(`games/${currentGameCode}/deadPlayers/${username}/acknowledged`).set(true);
    
    let count = 10;
    const countdownEl = document.getElementById('countdown');
    const interval = setInterval(() => {
        count--;
        countdownEl.innerText = count;
        if(count <= 0) {
            clearInterval(interval);
            document.getElementById('timerStatusText').style.display = 'none';
            countdownEl.style.display = 'none';
            document.getElementById('finalDeathNote').style.display = 'block';
        }
    }, 1000);
}
</script>
</body>
</html>
